# miniSWG — Local Development Backend
# Mirrors the production stack on DigitalOcean.
#
# Usage:
#   docker compose up -d            # start everything
#   docker compose logs -f nakama   # watch nakama logs
#   docker compose down             # stop (data persists in volumes)
#   docker compose down -v          # stop AND wipe all data
#
# Nakama admin console: http://localhost:7351  (admin / admin_local)
# Nakama HTTP API:      http://localhost:7350

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: miniswg_local_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       nakama
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: localdev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Nakama ────────────────────────────────────────────────────────────────
  nakama:
    image: heroiclabs/nakama:3.22.0
    container_name: miniswg_local_nakama
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./nakama/local.yml:/nakama/data/local.yml:ro
      - ./nakama/data:/nakama/data
    ports:
      - "7349:7349"   # gRPC API
      - "7350:7350"   # HTTP API + WebSocket
      - "7351:7351"   # Admin console
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - |
        /nakama/nakama migrate up \
          --database.address postgres:localdev@postgres:5432/nakama
        exec /nakama/nakama \
          --config /nakama/data/local.yml \
          --database.address postgres:localdev@postgres:5432/nakama
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7350/ > /dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  pgdata:
    driver: local
