# Nakama server configuration — miniSWG LOCAL DEV
# Mirrors production config in /opt/miniswg/nakama/local.yml on the VPS.

name: miniswg-local

data_dir: "/nakama/data/"

logger:
  level: "DEBUG"
  stdout: true
  file: ""

runtime:
  path: "/nakama/data/modules"
  js_min_count: 1
  js_max_count: 4

socket:
  server_key: "miniswg-server-key"
  port: 7350
  max_message_size_bytes: 4096
  max_request_size_bytes: 131072
  idle_timeout_ms: 60000
  write_wait_ms: 5000
  pong_wait_ms: 25000
  ping_period_ms: 15000

console:
  port: 7351
  username: "admin"
  password: "admin_local"
  signing_key: "miniswg_local_signing_key"

session:
  token_expiry_sec: 7200
  refresh_token_expiry_sec: 3600
  single_match: false
  single_party: false
  single_session: false

storage:
  disable_index_only_scans: false
